name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_BASE_API_URL: https://api.showgo.tj
      NEXT_PUBLIC_IP_API_URL: https://api.showgo.tj
      NEXT_PUBLIC_COUNTRY_CODE: tj
      NEXT_PUBLIC_APP_NAME: showgotj
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Activate Yarn (classic) via corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Cache Next build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('yarn.lock') }}
          restore-keys: ${{ runner.os }}-next-

      - name: Install
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Lint styles
        run: yarn lint:styles

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test --run

      - name: Build
        run: yarn build
